<script>
    let html5QrCode;

    // Tenta GPS, se falhar usa IP, se falhar usa valor padrão.
    async function detectLocationAndWeather() {
        const status = document.getElementById('status');
        const tempInput = document.getElementById('temp');

        status.innerText = "SYNCING WEATHER...";

        try {
            // Tentativa 1: Localização por IP (Mais rápido e não pede permissão)
            const ipRes = await fetch("https://ipapi.co/json/");
            const ipData = await ipRes.json();
            const city = ipData.city || "Larvik"; // Se falhar, assume Larvik como base

            // Busca temperatura para essa cidade
            const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${ipData.latitude}&longitude=${ipData.longitude}&current_weather=true`);
            const weatherData = await weatherRes.json();
            
            if (weatherData.current_weather) {
                tempInput.value = Math.round(weatherData.current_weather.temperature);
                status.innerText = `SYNCED: ${city.toUpperCase()}`;
                updateDriverView();
            }
        } catch (e) {
            console.log("Erro na detecção automática, tentando GPS...");
            // Tentativa 2: GPS do Aparelho
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&current_weather=true`);
                    const data = await res.json();
                    tempInput.value = Math.round(data.current_weather.temperature);
                    status.innerText = "GPS SYNCED";
                    updateDriverView();
                }, () => {
                    status.innerText = "MANUAL MODE ACTIVE";
                });
            }
        }
    }

    function resetCounters() {
        document.getElementById('packages_heavy').value = 0;
        document.getElementById('packages_light').value = 0;
        document.getElementById('weight').value = 0;
        updateDriverView();
    }

    async function startScanner() {
        const readerDiv = document.getElementById('reader');
        const scanBtn = document.getElementById('scan-btn');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            stream.getTracks().forEach(track => track.stop());
            readerDiv.style.display = 'block';
            scanBtn.innerText = "CAMERA ACTIVE...";

            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");

            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 150 } },
                (decodedText) => {
                    let inputL = document.getElementById('packages_light');
                    inputL.value = (parseInt(inputL.value) || 0) + 1;
                    
                    html5QrCode.stop().then(() => {
                        readerDiv.style.display = 'none';
                        scanBtn.innerText = "[ ] SCAN PACKAGE (AUTO-UPDATE)";
                        updateDriverView();
                    });
                }
            ).catch(err => alert(err));
        } catch (err) { alert("Camera Access Denied."); }
    }

    async function updateDriverView() {
        const h = document.getElementById('hours').value;
        const t = document.getElementById('temp').value;
        const w = document.getElementById('weight').value;
        const ph = document.getElementById('packages_heavy').value;
        const pl = document.getElementById('packages_light').value;
        
        const riskValueText = document.getElementById('risk-value');
        const circle = document.getElementById('circle');
        const statusMsg = document.getElementById('status');

        try {
            const res = await fetch("https://sala-risk-engine-718760302477.europe-north1.run.app", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    "driving_hours": parseFloat(h), "temp": parseFloat(t),
                    "total_weight": parseFloat(w), "heavy_packages": parseInt(ph),
                    "light_packages": parseInt(pl)
                })
            });
            const data = await res.json();
            const risk = data.risk_index;
            riskValueText.innerText = risk + "%";

            if(risk >= 80) {
                circle.style.borderColor = "#ff4444";
                statusMsg.style.color = "#ff4444";
            } else if(risk >= 50) {
                circle.style.borderColor = "#ffa500";
                statusMsg.style.color = "#ffa500";
            } else {
                circle.style.borderColor = "#28a745";
                statusMsg.style.color = "#28a745";
            }
        } catch (e) { riskValueText.innerText = "ERR"; }
    }

    window.onload = detectLocationAndWeather;
</script>
