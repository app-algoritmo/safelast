<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SALA • Driver View</title>
    <style>
        body { 
            background: #0a0e14; 
            color: #ffffff; 
            font-family: sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh;
        }
        .app-container { width: 90%; max-width: 400px; text-align: center; }
        .risk-circle {
            width: 200px; height: 200px; border-radius: 50%;
            border: 15px solid #1a1f26; margin: 20px auto;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; transition: all 0.5s;
        }
        #risk-value { font-size: 3.5rem; font-weight: 900; margin: 0; }
        .input-group { margin-top: 30px; }
        label { display: block; color: #888; font-size: 0.8rem; margin-bottom: 10px; }
        input { 
            background: #1a1f26; border: none; color: white; 
            padding: 15px; width: 80%; border-radius: 10px; 
            font-size: 1.2rem; text-align: center; margin-bottom: 20px;
        }
        button { 
            background: #007bff; color: white; border: none; 
            padding: 20px; width: 90%; border-radius: 15px; 
            font-size: 1.1rem; font-weight: bold; cursor: pointer;
        }
        .status-msg { margin-top: 20px; font-weight: bold; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="app-container">
        <p style="color: #007bff; font-weight: bold;">SALA • SAFE-LOAD</p>
        
        <div class="risk-circle" id="circle">
            <p id="risk-value">--%</p>
            <span style="font-size: 0.7rem; color: #888;">RISK INDEX</span>
        </div>

        <div id="status" class="status-msg">Initializing...</div>

        <div class="input-group">
            <label>CURRENT DRIVING HOURS</label>
            <input type="number" id="hours" value="4.5" step="0.1">
            
            <label>OUTSIDE TEMPERATURE (°C)</label>
            <input type="number" id="temp" value="-2">
            
            <button onclick="updateDriverView()">CHECK SAFETY STATUS</button>
        </div>
        
        <a href="index.html" style="color: #444; text-decoration: none; display: block; margin-top: 30px; font-size: 0.8rem;">Exit Driver Mode</a>
    </div>

    <script>
        async function updateDriverView() {
            const h = document.getElementById('hours').value;
            const t = document.getElementById('temp').value;
            const res = await fetch("https://sala-risk-engine-718760302477.europe-north1.run.app", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ "driving_hours": parseFloat(h), "temp": parseFloat(t) })
            });
            const data = await response = await res.json();
            const risk = data.risk_index;
            
            document.getElementById('risk-value').innerText = risk + "%";
            const circle = document.getElementById('circle');
            const status = document.getElementById('status');

            if(risk > 70) {
                circle.style.borderColor = "#ff4444";
                status.innerText = "STOP: MECHANICAL ASSISTANCE REQUIRED";
                status.style.background = "rgba(255, 68, 68, 0.2)";
                status.style.color = "#ff4444";
            } else {
                circle.style.borderColor = "#28a745";
                status.innerText = "SAFE TO OPERATE";
                status.style.background = "rgba(40, 167, 69, 0.2)";
                status.style.color = "#28a745";
            }
        }
        window.onload = updateDriverView;
    </script>
</body>
</html>
