<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SALA • Safe-Load Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #002b5c;
            --accent: #0056b3;
            --success: #28a745;
            --text-dark: #1a1a1a;
            --text-light: #666;
            --bg-light: #ffffff;
            --border: #e1e4e8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* 1. Flags Centralized */
        .lang-switch {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .lang-switch img {
            width: 32px;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid transparent;
            border-radius: 4px;
            padding: 2px;
        }
        .lang-switch img.active {
            border-color: var(--accent);
            filter: none;
            opacity: 1;
        }
        .lang-switch img:not(.active) {
            filter: grayscale(100%);
            opacity: 0.5;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
            margin: 0;
            color: var(--primary);
            text-transform: uppercase;
        }
        .subtitle {
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        /* Features Card */
        .features-card {
            background: #fff;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
            margin-bottom: 30px;
        }
        .feature-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 20px;
        }
        .check-icon {
            color: var(--success);
            margin-right: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            line-height: 1;
        }
        .feature-text strong {
            display: block;
            font-size: 0.95rem;
            color: var(--primary);
        }
        .feature-text span {
            font-size: 0.85rem;
            color: var(--text-light);
        }

        /* Login Box */
        .login-form {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        input {
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
        }
        
        .btn-access {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            text-decoration: none;
            text-align: center;
            transition: 0.3s;
        }
        .btn-access:hover { background-color: var(--accent); }

        footer {
            margin-top: 60px;
            font-size: 0.75rem;
            color: var(--text-light);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="lang-switch">
        <img src="https://flagcdn.com/w40/no.png" alt="Norsk" onclick="setLanguage('no')" id="flag-no">
        <img src="https://flagcdn.com/w40/gb.png" alt="English" onclick="setLanguage('en')" id="flag-en" class="active">
    </div>

    <header>
        <h1 id="main-title">SALA • Safe-Load Analytics</h1>
        <div class="subtitle" id="main-subtitle">Predictive Intelligence for Logistics & Transport</div>
    </header>

    <div class="features-card" id="features-list">
        </div>

    <div class="login-form">
        <input type="text" id="input-id" placeholder="Enterprise ID or Email">
        <input type="password" id="input-pass" placeholder="Password">
        <a href="index_start.html" class="btn-access" id="btn-login">ACCESS PLATFORM</a>
    </div>

    <footer>
        © 2026 SALA - Safe-Load Analytics | Biomechanical Risk Research | All rights reserved.
    </footer>

    <script>
        const translations = {
            en: {
                subtitle: "Predictive Intelligence for Logistics & Transport",
                features: [
                    { t: "AI-Driven Injury Prediction", d: "Advanced Artificial Intelligence models that forecast driver injury risks before they occur." },
                    { t: "Predictive Health Analytics", d: "Smart data processing to identify physiological stress patterns in real-time." },
                    { t: "Autonomous Safety Monitoring", d: "AI algorithms constantly scanning for high-risk biomechanical operational conditions." },
                    { t: "Legal Compliance Automation", d: "Seamless alignment with AML § 4-4 standards through automated AI reporting." }
                ],
                placeholderId: "Enterprise ID or Email",
                placeholderPass: "Password",
                btnLogin: "ACCESS PLATFORM"
            },
            no: {
                subtitle: "Prediktiv intelligens for logistikk og transport",
                features: [
                    { t: "AI-drevet skadeprediksjon", d: "Avanserte AI-modeller som forutsier risiko for førerskader før de oppstår." },
                    { t: "Prediktiv helseanalyse", d: "Smart databehandling for å identifisere fysiologiske stressmønstre i sanntid." },
                    { t: "Autonom sikkerhetsovervåking", d: "AI-algoritmer som kontinuerlig skanner etter biomekaniske risikoforhold." },
                    { t: "Automatisering av lovlydighet", d: "Sømløs justering mot AML § 4-4 standarder gjennom automatisert AI-rapportering." }
                ],
                placeholderId: "Bedrifts-ID eller e-post",
                placeholderPass: "Passord",
                btnLogin: "FÅ TILGANG TIL PLATTFORM"
            }
        };

        function setLanguage(lang) {
            // Update Flags
            document.getElementById('flag-en').classList.toggle('active', lang === 'en');
            document.getElementById('flag-no').classList.toggle('active', lang === 'no');

            // Update Texts
            const data = translations[lang];
            document.getElementById('main-subtitle').innerText = data.subtitle;
            document.getElementById('input-id').placeholder = data.placeholderId;
            document.getElementById('input-pass').placeholder = data.placeholderPass;
            document.getElementById('btn-login').innerText = data.btnLogin;

            // Update Features list
            const listContainer = document.getElementById('features-list');
            listContainer.innerHTML = '';
            data.features.forEach(f => {
                listContainer.innerHTML += `
                    <div class="feature-item">
                        <span class="check-icon">✓</span>
                        <div class="feature-text">
                            <strong>${f.t}</strong>
                            <span>${f.d}</span>
                        </div>
                    </div>`;
            });
        }

        // Initialize with English
        setLanguage('en');
    </script>
</body>
</html>
