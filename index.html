<script>
    const translations = {
        en: {
            tagline: "Predictive Intelligence for Norwegian Logistics",
            driver: "DRIVER APP",
            driverUrl: "driver.html",
            dashboard: "LIVE DASHBOARD",
            dashboardUrl: "dashboard.html", // Link original EN
            company: "COMPANY ACCESS",
            companyUrl: "https://paulofbarros.github.io/safelast-site/company.html", // Link original EN
            overviewH: "Overview",
            overviewP: "SALA is a proprietary predictive framework designed to quantify and mitigate ergonomic risks in the Norwegian transport sector, focusing on reducing long-term sickness claims (sykemelding).",
            algorithmH: "The Core Algorithm",
            algorithmP: "Ergonomic Risk Index Calculation:",
            scienceH: "The Science Behind SALA",
            sfP: "<strong>Biomechanical Surface Factor (Sf):</strong> Operating on compressed snow or ice requires up to 80% more stabilizer muscle activation. We apply a <strong>1.8x multiplier</strong> to account for increased torque on the lumbar region (L5/S1) during unstable conditions.",
            fiP: "<strong>Neuromuscular Fatigue (Fi):</strong> Risk scales exponentially after <strong>6h 30m</strong> of active duty. Vibration-induced fatigue leads to delayed motor response, making manual load adjustments significantly more hazardous.",
            regP: "<strong>Regulatory Compliance (Arbeidsmiljøloven § 4-4):</strong> SALA is designed to fulfill the Norwegian Working Environment Act requirements, providing data-driven evidence for the <em>Verneombud</em> (Safety Delegate) to mandate mechanical assistance."
        },
        no: {
            tagline: "Prediktiv Intelligens for Norsk Logistikk",
            driver: "SJÅFØR APP",
            driverUrl: "driver_no.html",
            dashboard: "SANNTIDSDASHBOARD",
            dashboardUrl: "dashboard_no.html", // Novo link NO
            company: "BEDRIFTSTILGANG",
            companyUrl: "company_no.html", // Novo link NO (ajustado para o arquivo local)
            overviewH: "Oversikt",
            overviewP: "SALA er et proprietært prediktivt rammeverk designet for å kvantifisere og redusere ergonomisk risiko i den norske transportsektoren, med fokus på å redusere sykefravær.",
            algorithmH: "Kjernealgoritmen",
            algorithmP: "Beregning av ergonomisk risikoindeks:",
            scienceH: "Vitenskapen bak SALA",
            sfP: "<strong>Biomekanisk overflatefaktor (Sf):</strong> Arbeid på komprimert snø eller is krever opptil 80% mer aktivering av stabiliseringsmuskulatur. Vi bruker en <strong>1,8x multiplikator</strong> for å ta høyde for økt belastning på korsryggen (L5/S1).",
            fiP: "<strong>Nevromuskulær tretthet (Fi):</strong> Risiko øker eksponentielt etter <strong>6t 30m</strong> aktiv tjeneste. Vibrasjonsindusert tretthet fører til forsinket motorisk respons.",
            regP: "<strong>Samsvar med regelverk (Arbeidsmiljøloven § 4-4):</strong> SALA er utviklet for å oppfylle kravene i arbeidsmiljøloven, og gir datadrevet dokumentasjon for <em>verneombudet</em> ved behov for mekanisk assistanse."
        }
    };

    function translateTo(lang) {
        document.querySelectorAll('.lang-nav-central span').forEach(s => s.classList.remove('active'));
        document.getElementById('btn-' + lang).classList.add('active');
        
        document.getElementById('tagline').innerText = translations[lang].tagline;
        
        // Atualização do Botão Driver
        const driverBtn = document.getElementById('btn-driver');
        driverBtn.innerText = translations[lang].driver;
        driverBtn.setAttribute('href', translations[lang].driverUrl);

        // Atualização do Botão Dashboard
        const dashBtn = document.getElementById('btn-dashboard');
        dashBtn.innerText = translations[lang].dashboard;
        dashBtn.setAttribute('href', translations[lang].dashboardUrl);

        // Atualização do Botão Company
        const compBtn = document.getElementById('btn-company');
        compBtn.innerText = translations[lang].company;
        compBtn.setAttribute('href', translations[lang].companyUrl);

        document.getElementById('h-overview').innerText = translations[lang].overviewH;
        document.getElementById('p-overview').innerText = translations[lang].overviewP;
        document.getElementById('h-algorithm').innerText = translations[lang].algorithmH;
        document.getElementById('p-algorithm').innerText = translations[lang].algorithmP;
        document.getElementById('h-science').innerText = translations[lang].scienceH;
        document.getElementById('p-sf').innerHTML = translations[lang].sfP;
        document.getElementById('p-fi').innerHTML = translations[lang].fiP;
        document.getElementById('p-reg').innerHTML = translations[lang].regP;
    }

    window.onload = () => {
        const userLang = (navigator.languages && navigator.languages[0]) || navigator.language || navigator.userLanguage; 
        
        if (userLang.startsWith('nb') || userLang.startsWith('nn') || userLang.startsWith('no')) {
            translateTo('no');
        }
    };
</script>
